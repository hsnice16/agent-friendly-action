# https://lefthook.dev/configuration/
#
# Activate locally: `npm run prepare-hooks` (alias for `lefthook install`).

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,json,jsonc}"
      run: npx --no-install biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.ts"
      run: npx --no-install tsc --noEmit

    - name: test
      glob: "*.ts"
      run: npm test

    - name: file-length
      glob: "src/**/*.ts"
      run: |
        wc -l {staged_files} | awk '$2 != "total" && $1 > 300 { printf "✗ %s: %d lines (cap: 300)\n", $2, $1; bad=1 } END { exit bad+0 }'
